<section class="section fade-in">
  <h1>Ban Appeal</h1>
  <p>Please fill out the form honestly. Your appeal will be reviewed by staff.</p>

  <form action="https://formspree.io/f/yourformid" method="POST" class="ban-form fade-in">
    <label>Your Username:</label>
    <input type="text" name="username" required>
    <label>Date of Ban:</label>
    <input type="date" name="ban-date" required>
    <label>Reason for Appeal:</label>
    <textarea name="reason" rows="6" required></textarea>
    <button type="submit" class="btn btn-primary">Submit Appeal</button>
  </form>
</section>
